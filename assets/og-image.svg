<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Ledger — Free Invoice Generator">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5e9"/>
      <stop offset="100%" stop-color="#efe7d3"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#paper)"/>

  <!-- hairline frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#1c1812" stroke-width="1"/>
  <rect x="52" y="52" width="1096" height="526" fill="none" stroke="#1c1812" stroke-width="0.5" opacity="0.4"/>

  <!-- top eyebrow -->
  <text x="80" y="110" font-family="JetBrains Mono, monospace" font-size="18"
        letter-spacing="6" fill="#8b2e1f">FREE · NO SIGNUP · OPEN SOURCE</text>

  <!-- monogram badge -->
  <g transform="translate(990, 90)">
    <rect width="120" height="120" rx="6" fill="#1c1812"/>
    <rect x="8" y="8" width="104" height="104" fill="none" stroke="#a37a3a" stroke-width="0.8"/>
    <text x="60" y="92" text-anchor="middle"
          font-family="Fraunces, 'Playfair Display', Georgia, serif"
          font-style="italic" font-weight="700" font-size="84" fill="#f6f3ec">§</text>
  </g>

  <!-- divider -->
  <line x1="80" y1="150" x2="980" y2="150" stroke="#1c1812" stroke-width="1"/>

  <!-- headline -->
  <text x="80" y="290" font-family="Fraunces, 'Playfair Display', Georgia, serif"
        font-weight="900" font-size="120" fill="#1c1812" letter-spacing="-4">Invoice,</text>
  <text x="80" y="410" font-family="Fraunces, 'Playfair Display', Georgia, serif"
        font-weight="400" font-style="italic" font-size="120" fill="#1c1812" letter-spacing="-3">composed.</text>

  <!-- accent dot -->
  <rect x="690" y="380" width="22" height="22" fill="#8b2e1f"/>

  <!-- subhead -->
  <text x="80" y="475" font-family="Newsreader, Georgia, serif"
        font-style="italic" font-size="32" fill="#3a3024">
    Five designer-grade templates · PDF export · Runs in your browser.
  </text>

  <!-- footer rule -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#1c1812" stroke-width="0.6" opacity="0.6"/>

  <!-- footer caps -->
  <text x="80" y="568" font-family="JetBrains Mono, monospace" font-size="16"
        letter-spacing="4" fill="#3a3024">LEDGER · AN INVOICE COMPOSER</text>
  <text x="1120" y="568" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="16"
        letter-spacing="4" fill="#3a3024">§ MMXXVI</text>
</svg>
