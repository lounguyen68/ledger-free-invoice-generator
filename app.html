<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Editor — Ledger Free Invoice Generator</title>
    <meta name="description" content="Compose your invoice with deep theme controls and instant PDF export." />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#1c1812" />

    <link rel="canonical" href="https://spacingmind.github.io/ledger-invoice-generator/app.html" />

    <!-- Open Graph — even though /app.html is noindex, share previews still
         hit OG tags (e.g. when someone DMs the editor link). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ledger" />
    <meta property="og:title" content="Ledger — Compose your invoice" />
    <meta property="og:description" content="Compose your invoice with deep theme controls and instant PDF export." />
    <meta property="og:url" content="https://spacingmind.github.io/ledger-invoice-generator/app.html" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://spacingmind.github.io/ledger-invoice-generator/assets/og-image.png" />
    <meta property="og:image:secure_url" content="https://spacingmind.github.io/ledger-invoice-generator/assets/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ledger — Invoice, composed." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ledger — Compose your invoice" />
    <meta name="twitter:description" content="Compose your invoice with deep theme controls and instant PDF export." />
    <meta name="twitter:image" content="https://spacingmind.github.io/ledger-invoice-generator/assets/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Ledger" />
    <meta name="application-name" content="Ledger" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body class="app-body">
    <a href="#tab-rail" class="skip-link">Skip to controls</a>

    <!-- Mounted by HeaderView -->
    <div id="app-header-host"></div>

    <div class="editor-layout">
      <!-- Edit drawer wraps the tab rail + tab panel.
           Desktop: display: contents (transparent grid wrapper).
           Tablet/mobile: position: fixed slide-in panel. -->
      <div id="edit-drawer" class="edit-drawer" aria-label="Editor">
        <button type="button" class="edit-drawer-close" id="edit-drawer-close" aria-label="Close editor">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M6 6 L18 18 M18 6 L6 18"/>
          </svg>
        </button>
        <!-- Mounted by TabsView (rail + panel + 3 tab hosts inside) -->
        <div id="tab-rail-host" style="display: contents"></div>
      </div>

      <!-- Mounted by AppController.mountShell — emits FAB + scrim + zoom toolbar + preview pane -->
      <div id="preview-host" style="display: contents"></div>
    </div>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
